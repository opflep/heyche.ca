<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Che — Coming Soon</title>
    <meta name="description" content="Che — Something delicious is on the way. Stay tuned!">
    <meta property="og:title" content="Che — Coming Soon">
    <meta property="og:description" content="Something delicious is on the way. Stay tuned!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://heyche.ca">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --maroon: #6b1520;
            --maroon-light: #8a2030;
            --grey: #999;
            --grey-light: #ccc;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--maroon);
        }

        .container {
            text-align: center;
            padding: 2rem;
            animation: fadeInUp 1s ease-out;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo img {
            width: clamp(160px, 30vw, 260px);
            height: auto;
        }

        .tagline {
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            font-weight: 300;
            color: var(--grey);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .contact {
            animation: fadeIn 1s ease-out 0.7s both;
        }

        .contact a {
            color: var(--maroon);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.95rem;
            letter-spacing: 0.03em;
            border-bottom: 1px solid var(--grey-light);
            padding-bottom: 2px;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .contact a:hover {
            border-color: var(--maroon);
        }

        .socials {
            margin-top: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .socials a {
            color: var(--grey-light);
            transition: color 0.3s ease, transform 0.3s ease;
            display: inline-flex;
        }

        .socials a:hover {
            color: var(--maroon);
            transform: translateY(-2px);
        }

        .socials svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.svg" alt="Che">
        </div>
        <p class="tagline">Coming Soon</p>

        <div class="contact">
            <a href="mailto:info@heyche.ca">info@heyche.ca</a>
        </div>

        </div>

</body>
